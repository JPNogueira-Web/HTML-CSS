<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parágrafos</title>
</head>
<body>
    <h1>parágrafos e quebras de linhas</h1>
    <hr>
    <p>Você pode escrever um parágrafo de qualquer jeito. Basta colocar tudo no par de tags p e /p</p>
  
    <p>Se precisar quebrar a linha <br>como essa, é só usar o br</p>
<!--Dá pra abrir uma tag com &lt e &gt, significam Menor que / Maior que-->

<p>Vamos adicionar alguns símbolos:
    &reg;
    &copy;
    &trade;
    &euro;
    &Delta;
</p>
<p>Também podemos adicionar emojis:
    &#x1F44D; <br> é só pesquisar por emojipedia
</p>

</body>
</html>
