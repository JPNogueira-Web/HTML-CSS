<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Midias em HTML5</title>
</head>
<body>
    <H1>Imagem dinâmica</H1>
    <p>Tente abrir esse site em varios dispositivos diferentes ou simplesmente aumente e diminua o tamanho do seu navegador. </p>
    <picture>
        <source media="(max-width: 750px)" srcset="Imagens/Imagem-P.png.png" type="image/png">
        <source media="(max-width: 1050px)" srcset="Imagens/imagem-M.png" type="image/png">
        <img src="Imagens/imagem-G.png" alt="Imagem flexível">
    </picture>
    <h1>Reproduzindo áudio</h1>
    <p>Como reproduzir áudios em HTML5.</p>
    <audio src="Mídia/happy-mistake.mp3"controls autoplay></audio>
<!-- Normalmente o seu navegador é compatível com esses formatos: MP3, waV e o OGG -->
 <P>Outro modo de reproduzir áudios.</P>
 <audio preload="auto" autoplay controls loop >
<source src="Mídia/guanacast-33.mp3" type="audio/mpeg">
<source src="Mídia/happy-mistake.ogg" type="audio/ogg">
<source src="Mídia/happy-mistake.wav" type="audio/wav">
 </audio>
 <!-- Arquivo waV é muito pesado, então tente evitar -->
  
</body>
</html>
