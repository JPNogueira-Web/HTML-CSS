<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pseudo-classes</title>
    <style>
        div{
            background-color: lightgray;
            border: 1px solid #000000;
            text-align: center;
            height: 200px;
            width: 200px;
            display: inline-block;
        }
        div:hover{
            background-color: lightblue;
        }
        /* hover é uma pseudo-classe, ou seja, é um seletor que seleciona um elemento quando ele está em um estado específico, nesse caso, quando o mouse está sobre ele. */
    </style>
</head>
<body>
    <div id="d1">01</div>
    <div id="d2">02</div>
    <div id="d3">03</div>
</body>
</html>
