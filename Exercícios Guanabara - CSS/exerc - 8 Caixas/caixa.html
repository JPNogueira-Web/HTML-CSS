<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caixas</title>
    <style>
        h1 {
            width: 300px;
            height: 50px;
            background-color: lightgray;
            border-width: 10px;
            border-style: solid;
            border-color: red;
            margin: 50px;
            padding: 20px;
            outline-width: 30px;
            outline-style: solid;
            outline-color: blue;
        }

        /* Podemos simplificar as propriedades de borda e contorno (border e outline) com: 
        border: 10px solid red; e outline: 30px solid blue; 
        Isso também pode ser feito com margin e padding como: 
        margin: 0px 10px 20px 30px; e padding: 10px 15px 20px 25px; A margem tem o modo auto, com ele dá pra centralizar. A ordem é no sentido horário, ou seja, cima direita baixo esquerda */

        /* Os estilos de borda são: solid, dashed, dotted, double, groove, ridge, inset, outset */

    </style>
</head>
<body>
    <h1>Caixa Exemplo 1</h1>
    
</body>
</html>
