<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gradiente em CSS</title>
    <style>
        /* Configuração global das css */
        * {
            height: 100%;
        }
        /* Existem vários tipos de gradientes, como linear, radial e cônico. O gradiente linear é o mais comum e é criado usando a função linear-gradient(). Ele permite criar uma transição suave entre duas ou mais cores ao longo de uma linha. O gradiente radial é criado usando a função radial-gradient() e cria uma transição circular entre as cores. Já o gradiente cônico é criado usando a função conic-gradient() e cria uma transição em forma de cone ao redor de um ponto central. */
      body {
        background-image: linear-gradient(130deg, #9D02F5, #FC00D9, #FE035C, #FE4601, #FFCD00 );
        background-attachment: fixed;
      }
      /* Dá pra mudar a direção do gradiente, usando os valores de ângulo (em graus) ou palavras-chave como to right, to left, to top, to bottom, etc. No exemplo acima, o gradiente é aplicado ao plano de fundo do corpo da página, criando uma transição suave entre as cores especificadas. O valor 130deg indica a direção do gradiente, que é de 130 graus em relação à linha horizontal. O background-attachment: fixed; faz com que o plano de fundo permaneça fixo enquanto o conteúdo da página rola. */
    </style>
</head>
<body>
    <h1>Testando gradiente</h1>
</body>
</html>
